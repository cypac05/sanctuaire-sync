<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuaire Non-OGM | Sync Zenodo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .log-entry { font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .checkbox-tile { transition: all 0.2s; }
        .checkbox-tile:hover { background-color: #334155; }
        input[type="checkbox"]:checked + div {
            background-color: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }
        /* Scrollbar personnalisée pour les logs */
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">
    <div id="app" class="min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="bg-slate-800 border-b border-slate-700 shadow-lg">
            <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <span class="text-3xl">🌱</span>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-wide">Sanctuaire Non-OGM</h1>
                        <p class="text-xs text-slate-400">Sélection avancée & Synchronisation Zenodo</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button @click="saveConfig" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded transition">
                        💾 Sauvegarder
                    </button>
                    <button @click="clearConfig" class="text-xs bg-slate-700 hover:bg-red-900/50 text-white px-3 py-1.5 rounded transition">
                        🗑️ Effacer
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-grow max-w-6xl mx-auto w-full px-6 py-8">
            
            <!-- 1. Configuration Connexion -->
            <div class="bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-6 mb-8">
                <h2 class="text-lg font-semibold text-white mb-4 flex items-center">
                    <span class="mr-2">🔌</span> Connexion
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-indigo-400 uppercase">Directus</h3>
                        <input v-model="config.directus_url" type="text" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:border-indigo-500 outline-none transition" placeholder="URL (ex: http://localhost:8058)">
                        <input v-model="config.directus_token" type="password" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:border-indigo-500 outline-none transition" placeholder="Token Admin">
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-emerald-400 uppercase">Zenodo</h3>
                        <input v-model="config.zenodo_url" type="text" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:border-emerald-500 outline-none transition" placeholder="URL (ex: https://sandbox.zenodo.org)">
                        <input v-model="config.zenodo_token" type="password" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:border-emerald-500 outline-none transition" placeholder="Token API">
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <span v-if="connectionStatus" :class="connectionStatus.success ? 'text-emerald-400' : 'text-red-400'" class="text-xs font-bold">
                        {{ connectionStatus.message }}
                    </span>
                    <button @click="testConnection" class="text-xs text-indigo-400 hover:text-indigo-300 underline">Tester la connexion</button>
                </div>
            </div>

            <!-- 2. Sélection de la Structure -->
            <div class="bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-6 mb-8" v-if="config.directus_url && config.directus_token">
                <h2 class="text-lg font-semibold text-white mb-4 flex items-center">
                    <span class="mr-2">📂</span> Sélection des Données
                </h2>
                
                <!-- Étape A : Charger les tables -->
                <div class="mb-6">
                    <button @click="loadCollections" :disabled="loadingCollections" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-sm transition flex items-center disabled:opacity-50">
                        <span v-if="loadingCollections" class="spinner w-4 h-4 border-2 border-white/30 border-t-white mr-2"></span>
                        {{ loadingCollections ? 'Chargement...' : '1. Charger la liste des tables' }}
                    </button>
                </div>

                <!-- Étape B : Choisir la table -->
                <div v-if="collections.length > 0" class="mb-6 p-4 bg-slate-900 rounded border border-slate-700">
                    <label class="block text-sm text-slate-400 mb-2">2. Choisissez la collection à synchroniser :</label>
                    <select v-model="selectedCollection" @change="loadFields" class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-white focus:border-indigo-500 outline-none">
                        <option value="" disabled>-- Sélectionner une table --</option>
                        <option v-for="col in collections" :key="col.collection" :value="col.collection">
                            {{ col.collection }} {{ col.meta?.note ? '(' + col.meta.note + ')' : '' }}
                        </option>
                    </select>
                </div>

                <!-- Étape C : Choisir les champs -->
                <div v-if="fields.length > 0" class="p-4 bg-slate-900 rounded border border-slate-700">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-sm text-slate-400">3. Sélectionnez les champs à inclure :</label>
                        <div class="space-x-2">
                            <button @click="selectAllFields" class="text-xs text-indigo-400 hover:underline">Tout sélectionner</button>
                            <button @click="deselectAllFields" class="text-xs text-slate-400 hover:underline">Aucun</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-64 overflow-y-auto p-2 bg-slate-950 rounded custom-scroll">
                        <label v-for="field in fields" :key="field.field" class="checkbox-tile flex items-center space-x-2 cursor-pointer p-2 rounded border border-slate-800">
                            <input type="checkbox" :value="field.field" v-model="selectedFields" class="hidden">
                            <div class="text-xs text-slate-300 break-all">
                                <span class="font-bold text-indigo-300">{{ field.field }}</span>
                                <span v-if="field.meta?.note" class="block text-[10px] text-slate-500 truncate">{{ field.meta.note }}</span>
                            </div>
                        </label>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-slate-800">
                        <label class="block text-sm text-slate-400 mb-1">Champ utilisé comme TITRE principal du DOI :</label>
                        <select v-model="config.fields_mapping.title_field" class="bg-slate-800 border border-slate-600 rounded px-3 py-1 text-sm text-white w-full md:w-1/2">
                            <option v-for="field in fields" :key="field.field" :value="field.field">
                                {{ field.field }}
                            </option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 3. Lancement -->
            <div class="flex justify-end mb-6">
                <button @click="startSync" :disabled="running || !isReadyToSync" 
                    class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-700 disabled:text-slate-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition flex items-center">
                    <div v-if="running" class="spinner"></div>
                    <span>{{ running ? 'Synchronisation en cours...' : '🚀 Lancer la Synchronisation' }}</span>
                </button>
            </div>

            <!-- 4. Terminal Output -->
            <div class="bg-black rounded-xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col h-96">
                <div class="bg-slate-900 px-4 py-2 border-b border-slate-800 flex justify-between items-center">
                    <span class="text-xs font-mono text-slate-400">Terminal Output</span>
                    <div class="flex space-x-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                </div>
                <div ref="logContainer" class="p-4 overflow-y-auto flex-grow font-mono text-sm space-y-1 custom-scroll">
                    <div v-if="logs.length === 0" class="text-slate-600 italic">
                        > En attente...<br>
                        > Commencez par tester la connexion puis charger les tables.
                    </div>
                    <div v-for="(log, index) in logs" :key="index" class="log-entry break-words p-1 rounded" :class="getLogClass(log)">
                        {{ log }}
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    config: {
                        directus_url: 'http://localhost:8058',
                        directus_token: '',
                        zenodo_url: 'https://sandbox.zenodo.org',
                        zenodo_token: '',
                        collection: '',
                        fields_mapping: {
                            title_field: '',
                            selected_fields: []
                        }
                    },
                    connectionStatus: null,
                    loadingCollections: false,
                    collections: [],
                    selectedCollection: '',
                    fields: [],
                    selectedFields: [],
                    logs: [],
                    running: false,
                    pollInterval: null
                }
            },
            mounted() {
                // Charger la configuration sauvegardée si elle existe
                const saved = localStorage.getItem('sanctuaire_config');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Fusionner avec la config par défaut pour éviter les erreurs si structure change
                        this.config = { ...this.config, ...parsed, fields_mapping: { ...this.config.fields_mapping, ...parsed.fields_mapping } };
                        this.addLog("⚙️ Configuration précédente chargée.", "info");
                    } catch (e) {
                        console.error("Erreur chargement config", e);
                    }
                }
            },
            computed: {
                isReadyToSync() {
                    return this.config.directus_url && this.config.directus_token && 
                           this.selectedCollection && this.selectedFields.length > 0 && 
                           this.config.fields_mapping.title_field &&
                           this.config.zenodo_url && this.config.zenodo_token;
                }
            },
            methods: {
                saveConfig() {
                    localStorage.setItem('sanctuaire_config', JSON.stringify(this.config));
                    this.addLog("💾 Configuration sauvegardée dans le navigateur.", "success");
                },
                clearConfig() {
                    localStorage.removeItem('sanctuaire_config');
                    this.addLog("🗑️ Configuration effacée.", "warn");
                    location.reload();
                },
                async testConnection() {
                    this.connectionStatus = null;
                    this.addLog("🔍 Test de connexion à Directus...", "info");
                    try {
                        const res = await fetch(`${this.config.directus_url}/server/info`, {
                            headers: { "Authorization": `Bearer ${this.config.directus_token}` }
                        });
                        if (res.ok) {
                            this.connectionStatus = { success: true, message: "✅ Connexion Directus établie" };
                            this.addLog("✅ Connexion Directus réussie !", "success");
                        } else {
                            this.connectionStatus = { success: false, message: "❌ Échec connexion" };
                            this.addLog("❌ Échec connexion. Vérifiez URL et Token.", "error");
                        }
                    } catch (e) {
                        this.connectionStatus = { success: false, message: "❌ Erreur réseau" };
                        this.addLog(`❌ Erreur réseau: ${e.message}`, "error");
                    }
                },
                async loadCollections() {
                    this.loadingCollections = true;
                    this.addLog("📡 Chargement de la liste des tables...", "info");
                    try {
                        const res = await fetch(`${this.config.directus_url}/collections`, {
                            headers: { "Authorization": `Bearer ${this.config.directus_token}` }
                        });
                        const data = await res.json();
                        if (data.data) {
                            this.collections = data.data;
                            this.addLog(`✅ ${this.collections.length} tables trouvées.`, "success");
                        }
                    } catch (e) {
                        this.addLog(`❌ Erreur chargement tables: ${e.message}`, "error");
                    } finally {
                        this.loadingCollections = false;
                    }
                },
                async loadFields() {
                    if (!this.selectedCollection) return;
                    this.config.collection = this.selectedCollection;
                    this.addLog(`🔍 Chargement des champs pour '${this.selectedCollection}'...`, "info");
                    try {
                        const res = await fetch(`${this.config.directus_url}/fields/${this.selectedCollection}`, {
                            headers: { "Authorization": `Bearer ${this.config.directus_token}` }
                        });
                        const data = await res.json();
                        if (data.data) {
                            const systemFields = ['date_created', 'date_updated', 'user_created', 'user_updated', 'sort', 'id'];
                            this.fields = data.data.filter(f => !systemFields.includes(f.field));
                            
                            const commonFields = ['Nom', 'Name', 'Description', 'Notes', 'acc_spiece', 'acc_name_of_accession'];
                            this.selectedFields = this.fields
                                .filter(f => commonFields.some(cf => f.field.toLowerCase().includes(cf.toLowerCase())))
                                .map(f => f.field);
                            
                            const titleCandidate = this.fields.find(f => ['Nom', 'Name', 'acc_name_of_accession', 'title'].includes(f.field));
                            if (titleCandidate) {
                                this.config.fields_mapping.title_field = titleCandidate.field;
                            } else if (this.fields.length > 0) {
                                this.config.fields_mapping.title_field = this.fields[0].field;
                            }

                            this.addLog(`✅ ${this.fields.length} champs chargés.`, "success");
                        }
                    } catch (e) {
                        this.addLog(`❌ Erreur chargement champs: ${e.message}`, "error");
                    }
                },
                selectAllFields() {
                    this.selectedFields = this.fields.map(f => f.field);
                },
                deselectAllFields() {
                    this.selectedFields = [];
                },
                async startSync() {
                    this.logs = [];
                    this.running = true;
                    this.addLog("🚀 Démarrage de la synchronisation...", "info");
                    
                    const syncConfig = {
                        directus_url: this.config.directus_url,
                        directus_token: this.config.directus_token,
                        zenodo_url: this.config.zenodo_url,
                        zenodo_token: this.config.zenodo_token,
                        collection: this.selectedCollection,
                        fields_mapping: {
                            title_field: this.config.fields_mapping.title_field,
                            selected_fields: this.selectedFields
                        }
                    };

                    try {
                        const res = await fetch('/api/start-sync', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(syncConfig)
                        });
                        if (!res.ok) throw new Error('Échec démarrage');
                        this.pollLogs();
                    } catch (e) {
                        this.addLog(`❌ Erreur: ${e.message}`, "error");
                        this.running = false;
                    }
                },
                async pollLogs() {
                    if (this.pollInterval) clearInterval(this.pollInterval);
                    this.pollInterval = setInterval(async () => {
                        try {
                            const res = await fetch('/api/logs');
                            const data = await res.json();
                            if (data.logs.length > this.logs.length) {
                                const newLogs = data.logs.slice(this.logs.length);
                                newLogs.forEach(log => this.addLog(log, this.detectLogLevel(log)));
                                this.scrollToBottom();
                            }
                            if (!data.running && this.running) {
                                this.running = false;
                                clearInterval(this.pollInterval);
                                this.addLog("🏁 Terminé.", "success");
                            }
                        } catch (e) { console.error(e); }
                    }, 1000);
                },
                addLog(msg, type = 'info') {
                    this.logs.push(msg);
                },
                detectLogLevel(msg) {
                    if (msg.includes('❌') || msg.includes('Erreur')) return 'error';
                    if (msg.includes('🎉') || msg.includes('SUCCÈS') || msg.includes('✅')) return 'success';
                    if (msg.includes('⚠️')) return 'warn';
                    return 'info';
                },
                getLogClass(log) {
                    if (log.includes('❌')) return 'log-error bg-red-900/10';
                    if (log.includes('🎉') || log.includes('✅')) return 'log-success bg-emerald-900/10';
                    if (log.includes('⚠️')) return 'log-warn bg-yellow-900/10';
                    return 'log-info';
                },
                scrollToBottom() {
                    this.$nextTick(() => {
                        if (this.$refs.logContainer) this.$refs.logContainer.scrollTop = this.$refs.logContainer.scrollHeight;
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
